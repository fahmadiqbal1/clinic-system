global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    system: clinic-aviva

scrape_configs:
  - job_name: clinic_sidecar
    static_configs:
      - targets: ['sidecar:8001']
    metrics_path: /metrics

  - job_name: mysql
    static_configs:
      - targets: ['mysql-exporter:9104']

  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']

  - job_name: node
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: nginx
    static_configs:
      - targets: ['nginx-exporter:9113']
    metrics_path: /metrics
