version: "3.9"

# ============================================================
# Aviva HealthCare — Production Docker Compose
# ============================================================

x-app-common: &app-common
  build:
    context: .
    dockerfile: docker/php/Dockerfile
  restart: unless-stopped
  env_file: .env
  volumes:
    - app_storage:/var/www/html/storage
  networks:
    - backend
  depends_on:
    mysql:
      condition: service_healthy
    redis:
      condition: service_healthy

services:

  # ── Nginx Reverse Proxy ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - app_storage:/var/www/html/storage:ro
      - ./public:/var/www/html/public:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── PHP-FPM Application ──────────────────────────────────
  app:
    <<: *app-common
    networks:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Queue Worker ─────────────────────────────────────────
  queue:
    <<: *app-common
    command: ["php", "artisan", "queue:work", "--sleep=3", "--tries=3", "--max-time=3600", "--max-jobs=500"]
    healthcheck:
      test: ["CMD-SHELL", "php artisan --version > /dev/null 2>&1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Scheduler ────────────────────────────────────────────
  scheduler:
    <<: *app-common
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction && sleep 60; done"
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 120s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── MySQL 8.0 ────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis 7 ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── AI Sidecar (FastAPI) ─────────────────────────────────
  sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file: ./sidecar/.env
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8001/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Ollama (optional AI, profile: ai) ────────────────────
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    profiles:
      - ai
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./sidecar/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - monitoring
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_DOMAIN: localhost
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./sidecar/observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Node Exporter ────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.8.0
    restart: unless-stopped
    command:
      - "--path.rootfs=/host"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /:/host:ro,rslave
    networks:
      - monitoring
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9100/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── MySQL Exporter ───────────────────────────────────────
  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "root:${MYSQL_ROOT_PASSWORD}@(mysql:3306)/"
    networks:
      - backend
      - monitoring
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9104/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis Exporter ───────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.60.0
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    networks:
      - backend
      - monitoring
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9121/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── NocoBase ─────────────────────────────────────────────
  nocobase:
    image: nocobase/nocobase:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:13000:80"
    environment:
      APP_KEY: ${NOCOBASE_APP_KEY}
      DB_DIALECT: postgres
      DB_HOST: nocobase-pg
      DB_PORT: 5432
      DB_DATABASE: nocobase
      DB_USER: nocobase
      DB_PASSWORD: ${NOCOBASE_DB_PASSWORD}
    depends_on:
      nocobase-pg:
        condition: service_healthy
    networks:
      - nocobase_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── NocoBase Postgres ─────────────────────────────────────
  nocobase-pg:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nocobase
      POSTGRES_USER: nocobase
      POSTGRES_PASSWORD: ${NOCOBASE_DB_PASSWORD}
    volumes:
      - nocobase_pg_data:/var/lib/postgresql/data
    networks:
      - nocobase_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocobase -d nocobase"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

# ============================================================
# Named Volumes
# ============================================================
volumes:
  mysql_data:
  redis_data:
  app_storage:
  certbot_certs:
  certbot_www:
  prometheus_data:
  grafana_data:
  nocobase_pg_data:
  ollama_data:

# ============================================================
# Networks
# ============================================================
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true
  monitoring:
    driver: bridge
    internal: true
  nocobase_net:
    driver: bridge
    internal: true
