name: CI / CD

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test-php:
    name: PHP Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: clinic_system_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo_mysql, mbstring, zip, gd, opcache, redis, intl, bcmath
          coverage: none

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --optimize-autoloader --prefer-dist --no-interaction
        env:
          APP_ENV: testing
          APP_KEY: base64:ci-placeholder-key-not-used-in-production==

      - name: Setup test environment
        run: |
          cp .env.example .env
          php artisan key:generate
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: clinic_system_test
          DB_USERNAME: root
          DB_PASSWORD: ""
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          REDIS_PASSWORD: ""
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          CLINIC_CASE_TOKEN_SECRET: ci-test-secret-not-for-production
          CLINIC_SIDECAR_JWT_SECRET: ci-test-jwt-secret-not-for-production

      - name: Run migrations
        run: php artisan migrate --force
        env:
          APP_ENV: testing
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: clinic_system_test
          DB_USERNAME: root
          DB_PASSWORD: ""
          REDIS_HOST: 127.0.0.1
          REDIS_PASSWORD: ""

      - name: Run PHP tests
        run: php artisan test --stop-on-failure
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: clinic_system_test
          DB_USERNAME: root
          DB_PASSWORD: ""
          REDIS_HOST: 127.0.0.1
          REDIS_PASSWORD: ""
          CLINIC_CASE_TOKEN_SECRET: ci-test-secret-not-for-production
          CLINIC_SIDECAR_JWT_SECRET: ci-test-jwt-secret-not-for-production

  test-sidecar:
    name: Sidecar Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: sidecar/requirements.txt

      - name: Install sidecar dependencies
        run: cd sidecar && pip install -r requirements.txt

      - name: Run sidecar tests
        run: cd sidecar && python -m pytest --tb=short -q

  build-and-push:
    name: Build & Push Docker Images
    needs: [test-php, test-sidecar]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for app
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/clinic-app
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push app image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/php/Dockerfile
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract metadata for sidecar
        id: meta-sidecar
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/clinic-sidecar
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push sidecar image
        uses: docker/build-push-action@v5
        with:
          context: ./sidecar
          file: ./sidecar/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-sidecar.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    environment: production
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}

    steps:
      - name: Deploy via SSH
        if: env.VPS_HOST != ''
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/clinic-system
            bash scripts/deploy.sh
